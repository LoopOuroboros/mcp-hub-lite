  # ----------------------------------------------------------------------
  # 搜索端点
  # ----------------------------------------------------------------------

  /api/servers/search:
    get:
      tags:
        - Search
      summary: 搜索服务器
      description: |
        根据关键词搜索MCP服务器，支持模糊匹配和标签过滤。

        搜索特性：
        - **关键词匹配**：对服务器名称、描述等信息进行模糊匹配
        - **标签过滤**：按标签键值对过滤结果
        - **相关性排序**：按匹配分数排序
        - **分页支持**：可限制返回结果数量
        - **性能优化**：使用专门的搜索引擎（如Elasticsearch）

        搜索支持多字段匹配：
        - 服务器名称（权重最高）
        - 服务器描述
        - 标签键值
      operationId: searchServers
      parameters:
        - $ref: '#/parameters/QueryParam'
        - $ref: '#/parameters/TagsParam'
        - $ref: '#/parameters/LimitParam'
        - name: offset
          in: query
          description: 跳过记录数（用于分页）
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
        - name: sortBy
          in: query
          description: 排序字段
          required: false
          schema:
            type: string
            enum: [score, lastSeen, name, createdAt]
            default: "score"
          example: "score"
        - name: sortOrder
          in: query
          description: 排序方向
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: "desc"
          example: "desc"
        - name: minScore
          in: query
          description: 最小匹配分数过滤（0-1）
          required: false
          schema:
            type: number
            format: float
            minimum: 0
            maximum: 1
            default: 0.1
          example: 0.3
        - $ref: '#/parameters/RequestIdParam'
      responses:
        '200':
          description: 成功搜索服务器
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              example:
                code: 200
                message: "搜索完成"
                data:
                  results:
                    - server:
                        id: "srv-001"
                        name: "MySQL数据库工具"
                        description: "提供MySQL数据库查询和管理功能"
                        status: "online"
                        tags:
                          category: "database"
                          environment: "production"
                        lastSeen: "2025-12-16T11:29:59.000Z"
                        statistics:
                          latencyMs: 45.6
                          toolCount: 15
                          uptimeSeconds: 86400
                          lastCallTimestamp: "2025-12-16T11:29:59.000Z"
                        version: "1.2.3"
                        mcpVersion: "2025-11-25"
                        createdAt: "2025-12-15T08:00:00.000Z"
                        updatedAt: "2025-12-16T10:30:00.000Z"
                      score: 0.95
                      matchedFields:
                        - "name"
                        - "description"
                        - "tags.category"
                    - server:
